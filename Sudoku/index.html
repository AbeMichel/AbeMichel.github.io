<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sudokus By Abe</title>
  <style>
    :root {
      /* Board Colors */
      --board-border-color: #333333;
      
      /* Cell States */
      --cell-bg: #ffffff;
      --cell-border: #cccccc;
      --cell-selected-bg: #bbdefb;
      --cell-selected-outline: #2196f3;
      --cell-highlight-bg: #e3f2fd;
      --cell-conflict-bg: #ffcdd2;
      
      /* Text Colors */
      --cell-value-color: #2196f3;
      --cell-fixed-color: #000000;
      --cell-conflict-color: #d32f2f;
      --candidate-color: #777777;
      
      /* Global Layout */
      --bg-color: #f5f5f5;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
    }
  </style>
  <link rel="stylesheet" href="src/config/theme.css">
</head>
<body>
  <app-root></app-root>
  <script type="module" src="./main.js"></script>
</body>
</html>
