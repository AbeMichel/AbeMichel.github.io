<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Terminal TTS | Kokoro</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
    #history { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; font-size: 1.1rem; }
    .user::before { content: "> "; color: #555; }
    .status { color: #ffb86c; font-style: italic; }
    .error { color: #ff5555; font-weight: bold; }

    #loading-bar-container { width: 100%; height: 2px; background: #222; }
    #loading-bar { width: 0%; height: 100%; background: #00ff41; transition: width 0.3s; }

    #input-container { border-top: 1px solid #222; padding: 15px; display: flex; align-items: center; }
    input { background: transparent; border: none; color: #00ff41; font-family: inherit; font-size: 1.1rem; flex: 1; outline: none; margin-left: 10px; }
  </style>
  <script type="module" crossorigin src="/tts/assets/index-C0bHa1dm.js"></script>
</head>
<body>

<div id="history">
  <div class="status">BOOTING...</div>
</div>

<div id="loading-bar-container">
  <div id="loading-bar"></div>
</div>

<div id="input-container">
  <span>&gt;</span>
  <input type="text" id="userInput" disabled placeholder="Loading..." autocomplete="off">
</div>

<!-- Define Module with hooks BEFORE loading the WASM loader -->
<script>
  window.Module = {
    setStatus: function(status) {
      console.log(`Status: ${status}`);
      const progressBar = document.getElementById('loading-bar');
      if (progressBar) {
        const downloadMatch = status.match(/Downloading data... \((\d+)\/(\d+)\)/);
        if (downloadMatch) {
          const downloaded = parseInt(downloadMatch[1]);
          const total = parseInt(downloadMatch[2]);
          const percent = (downloaded / total) * 100;
          progressBar.style.width = percent + "%";
        }
        if (status === 'Running...') {
          progressBar.style.width = "100%";
        }
      }
    }
  };
</script>

<!-- Load sherpa WASM (local build) -->
<script type="module" src="/tts/sherpa-onnx-wasm-main-tts.js"></script>
<script type="module" src="/tts/sherpa-onnx-tts.js"></script>

<!-- Your app -->

</body>
</html>
